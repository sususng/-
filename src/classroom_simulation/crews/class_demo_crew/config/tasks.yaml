# ============================================================
# 课堂模拟流程Task配置 - 课题：{topic}，年级：高一，课时：1课时（40分钟）
# ============================================================

read_prep_package_task:
  description: >
    从备课包目录读取所有教学文件。
    备课包路径为 output/{topic}/

    使用file_read工具依次读取：
    1. output/{topic}/教案.md
    2. output/{topic}/PPT脚本.md
    3. output/{topic}/说课稿.md
    4. output/{topic}/教学资源清单.md
    5. output/{topic}/课堂时间线.md
  expected_output: >
    备课包文件列表和内容摘要
  agent: leader_teacher

simulate_class_task:
  description: >
    按照课堂时间线进行40分钟模拟上课。

    【教师主导策略】
    1. 变"学生提问-教师回答"为"教师设问-学生思考-教师追问"
    2. 设计Q1-Q4层次问题链
    3. 对学生回答进行加工性反馈
    4. 巡视指导时增加"认知冲突"类提问

    【三类学生模拟】
    - 学优生：快速反应，主动提问
    - 中等生：按部就班，偶尔卡顿
    - 后进生：需要更多帮助，容易出错
  expected_output: >
    完整的课堂模拟全程记录
  agent: leader_teacher

generate_interaction_file_task:
  description: >
    根据模拟上课记录生成40分钟课堂模拟互动文件。

    【输出内容】
    1. 精确到秒的时间轴
    2. 每个环节的开始和结束时间
    3. 教师主导策略应用记录
    4. 三类学生模拟特点
    5. 边缘生关注记录
  expected_output: >
    一份完整的课堂模拟互动文件，包含时间轴、各环节时间、教师策略、学生模拟特点
  agent: leader_teacher
  output_file: output/{topic}/课堂模拟互动.md
  markdown: true

student_feedback_task:
  description: >
    学优生对已生成的课堂模拟互动文件提出反馈。

    【重要】必须首先使用file_read工具读取 output/{topic}/课堂模拟互动.md 文件
    然后基于该文件内容提出反馈意见。

    【学情定位】高一信息技术课程学优生，编程基础扎实。
    【反馈要求】只针对有问题或需要改进的地方，不用提好的部分。

    【反馈内容】
    1. 对课堂模拟互动文件中教师策略的评价
    2. 对三类学生模拟是否真实的看法
    3. 哪些环节模拟得不好，需要如何改进
  expected_output: >
    学优生对课堂模拟互动文件的反馈意见
  agent: student_advanced
  output_file: output/{topic}/学优生反馈.md
  markdown: true

student_feedback_intermediate_task:
  description: >
    中等生对已生成的课堂模拟互动文件提出反馈。

    【重要】必须首先使用file_read工具读取 output/{topic}/课堂模拟互动.md 文件
    然后基于该文件内容提出反馈意见。

    【学情定位】高一信息技术课程中等生，能跟着课堂节奏操作。
    【反馈要求】只针对有问题或需要改进的地方，不用提好的部分。

    【反馈内容】
    1. 对课堂模拟互动文件中学生模拟的评价
    2. 边缘生关注记录是否合理
    3. 哪些环节模拟得不符合实际，需要如何改进
  expected_output: >
    中等生对课堂模拟互动文件的反馈意见
  agent: student_intermediate
  output_file: output/{topic}/中等生反馈.md
  markdown: true

student_feedback_basic_task:
  description: >
    后进生对已生成的课堂模拟互动文件提出反馈。

    【重要】必须首先使用file_read工具读取 output/{topic}/课堂模拟互动.md 文件
    然后基于该文件内容提出反馈意见。

    【学情定位】高一信息技术课程后进生，基础薄弱，打字慢。
    【反馈要求】只针对有问题或需要改进的地方，不用提好的部分。

    【反馈内容】
    1. 对课堂模拟互动文件中边缘生模拟的评价
    2. 哪些地方没有照顾到后进生
    3. 需要增加哪些支持措施
  expected_output: >
    后进生对课堂模拟互动文件的反馈意见
  agent: student_basic
  output_file: output/{topic}/后进生反馈.md
  markdown: true

peer_observation_task:
  description: >
    听课教师基于课堂模拟互动文件进行观察和记录。

    【重要】必须首先使用file_read工具读取 output/{topic}/课堂模拟互动.md 文件
    然后基于该文件内容进行审核。

    【观察要点】
    1. 与教案的一致性
    2. 提问等待时间（≥3秒）
    3. 指令清晰度
    4. 师生互动情况
    5. 学生反应和问题
  expected_output: >
    听课教师的课堂观察报告
  agent: peer_teacher
  output_file: output/{topic}/听课教师观察报告.md
  markdown: true

class_academic_audit_task:
  description: >
    教导主任审核课堂模拟互动文件。

    【重要】必须首先使用file_read工具读取以下文件：
    - output/{topic}/课堂模拟互动.md
    - output/{topic}/教案.md
    - output/{topic}/PPT脚本.md
    然后基于这些文件进行对比审核。

    【审核要点】
    1. 与教案的一致性
    2. 与PPT脚本的一致性
    3. 与说课稿的一致性
    4. 教师主导策略应用情况
    5. 学生模拟情况
    6. 边缘生关注记录

    【修改机制】如果问题数量超过3点，生成修改版本：output/{topic}/课堂模拟互动_v2.md
  expected_output: >
    教导主任的课堂模拟审核报告
  agent: academic_director
  output_file: output/{topic}/课堂模拟教导主任审核报告.md
  markdown: true

class_content_audit_task:
  description: >
    教学内容审核官审核课堂模拟互动文件。

    【重要】必须首先使用file_read工具读取 output/{topic}/课堂模拟互动.md 文件
    然后基于该文件进行合规性审核。

    【审核要点】
    1. 意识形态合规性
    2. 科学性（无错误内容）
    3. 适龄性
    4. 安全与隐私保护

    【修改机制】如果问题数量超过3点，生成修改版本：output/{topic}/课堂模拟互动_v2.md
  expected_output: >
    内容审核官的课堂模拟合规性审核报告
  agent: content_auditor
  output_file: output/{topic}/课堂模拟内容审核报告.md
  markdown: true